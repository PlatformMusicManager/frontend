<div class="playlist-header">
  <div class="header-image shadow">
    <img [src]="image || 'default-playlist.png'" alt="Playlist Art" />
  </div>
  <div class="header-info">
    <h1 class="title">{{ title }}</h1>
    <div class="meta">
      <span class="owner">By {{ owner }} on {{ platformName() }}</span>
      <span class="duration">{{ count }} tracks | {{ formatedDuration() }}</span>
    </div>
  </div>
</div>
