<div class="platform-selector" [class.mode-soundcloud]="(currentPlatform$ | async) === Platform.Soundcloud">
    <div class="sliding-pill"></div>
    <button (click)="setPlatform(Platform.Deezer)" [class.active]="(currentPlatform$ | async) === Platform.Deezer">
        Deezer
    </button>
    <button (click)="setPlatform(Platform.Soundcloud)"
        [class.active]="(currentPlatform$ | async) === Platform.Soundcloud">
        SoundCloud
    </button>
</div>
