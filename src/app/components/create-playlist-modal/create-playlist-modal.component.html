<div class="modal-content">
    <h2>Create Playlist</h2>
    <input type="text" [(ngModel)]="playlistTitle" placeholder="My Playlist #1" (keyup.enter)="onCreate()" autofocus>
    <div class="modal-actions">
        <button class="cancel-btn" (click)="onCancel()">Cancel</button>
        <button class="create-btn" (click)="onCreate()" [disabled]="!playlistTitle.trim()">Create</button>
    </div>
</div>
