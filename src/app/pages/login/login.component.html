<div class="auth-container">
  <div class="auth-card">
    <h2 class="auth-title">Welcome Back</h2>
    <p class="auth-subtitle">Sign in to your account</p>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-group">
        <div class="error-message" *ngIf="loginForm.get('email')?.hasError('serverError')">
          {{ loginForm.get('email')?.errors?.['serverError'] }}
        </div>
        <label for="email">Email</label>
        <input type="email" id="email" formControlName="email" placeholder="name@example.com" class="form-input">
      </div>

      <div class="form-group">
        <div class="error-message" *ngIf="loginForm.get('password')?.hasError('serverError')">
          {{ loginForm.get('password')?.errors?.['serverError'] }}
        </div>
        <label for="password">Password</label>
        <input type="password" id="password" formControlName="password" placeholder="Enter your password"
          class="form-input">
      </div>

      <div class="error-message" *ngIf="errorMessage()">
        {{ errorMessage() }}
      </div>

      <button type="submit" [disabled]="loginForm.invalid" class="submit-btn">Sign In</button>
    </form>

    <p class="auth-footer">
      Don't have an account? <a href="/register">Sign up</a>
    </p>
  </div>
</div>
