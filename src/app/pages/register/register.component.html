<div class="auth-container">
    <div class="auth-card">
        <h2 class="auth-title">Create Account</h2>
        <p class="auth-subtitle">Join us today</p>

        <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="auth-form">
            <div class="form-group">
                <div class="error-message" *ngIf="registerForm.get('username')?.hasError('serverError')">
                    {{ registerForm.get('username')?.errors?.['serverError'] }}
                </div>
                <label for="username">Username</label>
                <input type="text" id="username" formControlName="username" placeholder="johndoe" class="form-input">
            </div>

            <div class="form-group">
                <div class="error-message" *ngIf="registerForm.get('email')?.hasError('serverError')">
                    {{ registerForm.get('email')?.errors?.['serverError'] }}
                </div>
                <label for="email">Email</label>
                <input type="email" id="email" formControlName="email" placeholder="name@example.com"
                    class="form-input">
            </div>

            <div class="form-group">
                <div class="error-message" *ngIf="registerForm.get('password')?.hasError('serverError')">
                    {{ registerForm.get('password')?.errors?.['serverError'] }}
                </div>
                <label for="password">Password</label>
                <input type="password" id="password" formControlName="password" placeholder="Create a password"
                    class="form-input">
            </div>

            <div class="error-message" *ngIf="errorMessage()">
                {{ errorMessage() }}
            </div>

            <button type="submit" [disabled]="registerForm.invalid" class="submit-btn">Sign Up</button>
        </form>

        <p class="auth-footer">
            Already have an account? <a href="/login">Sign in</a>
        </p>
    </div>
</div>
