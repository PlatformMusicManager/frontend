<div class="search-container">
    <div *ngIf="isLoading" class="loading">Loading...</div>

    <div *ngIf="!isLoading && searchResults">
        <section *ngIf="searchResults.tracks && searchResults.tracks.length > 0" class="results-section">
            <h3>Songs</h3>
            <div class="track-list">
                <app-search-track *ngFor="let track of searchResults.tracks" [track]="track">
                </app-search-track>
            </div>
        </section>

        <section *ngIf="searchResults.playlists && searchResults.playlists.length > 0" class="results-section">
            <h3>Playlists</h3>
            <div class="grid-container">
                <app-search-card *ngFor="let playlist of searchResults.playlists" [title]="playlist.title"
                    [subtitle]="'By ' + playlist.parent_username" [image]="playlist.picture" type="Playlist">
                </app-search-card>
            </div>
        </section>

        <section *ngIf="searchResults.artists && searchResults.artists.length > 0" class="results-section">
            <h3>Artists</h3>
            <div class="grid-container">
                <app-search-card *ngFor="let artist of searchResults.artists" [title]="artist.username"
                    subtitle="Artist" [image]="artist.picture" type="Artist">
                </app-search-card>
            </div>
        </section>

        <div *ngIf="(!searchResults.tracks.length && !searchResults.playlists.length && !searchResults.artists.length)"
            class="no-results">
            No results found for "{{ currentQuery }}"
        </div>
    </div>
</div>
