<section class="greeting-section main-window">
  <h1>{{ greeting }}</h1>

  @if (user?.playlists?.length) {
    <div class="grid-container">
      @for (playlist of user!.playlists; track playlist.id) {
        <app-playlist-card
          [id]="playlist.id.toString()"
          [title]="playlist.title"
          [subtitle]="'By ' + user!.username"
          [platform]="Platform.Own"
        />
      }
    </div>
  } @else {
    <div class="empty-state">
      <p>You don't have any playlists yet.</p>
    </div>
  }
</section>
